name: CI — Build and Push
on:
  push:
    branches: [ main, staging, dev ]
  pull_request:
    branches: [ main, staging ]
env:
  IMAGE_NAME: ${{ github.repository }}
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write   # required for Trivy SARIF upload
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 25
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -DskipTests -q

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3.10.0

      - name: Extract Docker metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy vulnerability scan ─────────────────────────────────────────
      - name: Run Trivy vulnerability scan (table output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref == 'refs/heads/main' && 'latest' || github.ref == 'refs/heads/staging' && 'staging' || 'dev' }}
          format: table
          exit-code: '0'          # don't fail the build — report only
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Run Trivy vulnerability scan (SARIF for GitHub Security tab)
        uses: aquasecurity/trivy-action@master
        if: github.event_name == 'push'
        with:
          image-ref: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref == 'refs/heads/main' && 'latest' || github.ref == 'refs/heads/staging' && 'staging' || 'dev' }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: github.event_name == 'push'
        with:
          sarif_file: trivy-results.sarif

      # ── Deploy triggers ───────────────────────────────────────────────────
      - name: Trigger staging deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
        uses: peter-evans/repository-dispatch@v3.0.0
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: decimeshi/decisionmesh-infra
          event-type: deploy-staging
          client-payload: '{"sha": "${{ github.sha }}"}'

      - name: Trigger prod deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peter-evans/repository-dispatch@v3.0.0
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: decimeshi/decisionmesh-infra
          event-type: deploy-prod
          client-payload: '{"sha": "${{ github.sha }}"}'
