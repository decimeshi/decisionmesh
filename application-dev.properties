# ========================================================================
# application-dev.properties
# Local development — API runs from your IDE.
# Infrastructure is started with:
#   docker compose -f docker-compose.yml -f docker-compose_local.yml up -d
#
# All services are exposed on localhost via port bindings in the
# local compose overlay, so no container-name DNS is needed here.
# ========================================================================

quarkus.profile=dev

# ==========================
# OIDC / Zitadel
# ==========================
quarkus.oidc.auth-server-url=https://decisionmesh-1pgrry.eu1.zitadel.cloud
quarkus.oidc.token.issuer=https://decisionmesh-1pgrry.eu1.zitadel.cloud
quarkus.oidc.client-id=368134611768783581
# Relaxed for local self-signed / dev certificates
quarkus.oidc.tls.verification=none

# ==========================
# OpenBao
# Token matches VAULT_DEV_ROOT_TOKEN_ID in docker-compose_local.yml
# ==========================
quarkus.vault.url=http://localhost:8200
quarkus.vault.authentication.client-token=dev-root-token

# ==========================
# Datasource
# Credentials match the defaults in docker-compose.yml (DB_USER / DB_PASSWORD).
# In dev, these are set directly here — no Vault needed.
# ==========================
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/decisionmesh
quarkus.datasource.username=decisionmesh
quarkus.datasource.password=changeme

quarkus.datasource.reactive.url=postgresql://localhost:5432/decisionmesh
quarkus.datasource.reactive.username=decisionmesh
quarkus.datasource.reactive.password=changeme

# ==========================
# Redis
# No password in dev — matches REDIS_PASSWORD default "changeme".
# ==========================
quarkus.redis.hosts=redis://:changeme@localhost:6379

# ==========================
# Kafka
# ==========================
mp.messaging.connector.smallrye-kafka.bootstrap.servers=localhost:9092

# ==========================
# Embedding
# ==========================
embedding.url=http://localhost:11434

# ==========================
# CORS
# ==========================
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Accept,Authorization,Content-Type,X-Requested-With,Idempotency-Key
quarkus.http.cors.access-control-allow-credentials=true

# ==========================
# HTTP
# ==========================
quarkus.http.host=0.0.0.0

# ==========================
# Logging — verbose for dev
# ==========================
quarkus.log.level=DEBUG
quarkus.log.category."com.decisionmesh".level=DEBUG
quarkus.log.console.json=false

# ==========================
# Health / Swagger
# ==========================
quarkus.smallrye-health.root-path=/health
quarkus.swagger-ui.always-include=true

# ==========================
# Stripe — test-mode keys (set these in Vault decisionmesh/billing for dev)
