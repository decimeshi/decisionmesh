# =====================================================
# application.properties
# COMMON / SHARED CONFIGURATION — loaded for ALL environments
# =====================================================

quarkus.jvm.additional-args=--add-opens java.base/java.lang=ALL-UNNAMED
quarkus.jvm.args=--add-opens java.base/java.lang=ALL-UNNAMED --enable-native-access=ALL-UNNAMED

# =====================================================
# OIDC / Zitadel
# =====================================================
quarkus.oidc.enabled=true
quarkus.oidc.application-type=service
quarkus.oidc.token.principal-claim=sub
quarkus.oidc.token.email-verified=false
quarkus.oidc.token.allow-jwt-introspection=false
quarkus.oidc.token.allow-opaque-token-introspection=false
quarkus.oidc.authentication.user-info-required=false
quarkus.oidc.jwks.resolve-early=true
quarkus.oidc.roles.role-claim-path=urn:zitadel:iam:org:project:roles
quarkus.oidc.connection-timeout=10S
quarkus.oidc.token.refresh-expired=false

# =====================================================
# OpenBao / Vault
#
# All KV paths are injected as Quarkus config at startup.
# Keys inside each secret MUST be valid Quarkus property names.
#
# Path → Injected credentials:
#   decisionmesh/db       → quarkus.datasource.username / .password
#   decisionmesh/redis    → quarkus.redis.hosts (includes password in URL)
#   decisionmesh/llm      → llm.*.api-key
#   decisionmesh/email    → quarkus.mailer.username / .password
#   decisionmesh/zitadel  → zitadel.*
#   decisionmesh/auth     → quarkus.oidc.credentials.secret (if applicable)
#   decisionmesh/billing  → stripe.secret.key / razorpay.key.*
#   decisionmesh/kafka    → placeholder (Kafka has no auth in current setup)
# =====================================================
quarkus.vault.kv-secret-engine-version=2
quarkus.vault.secret-config-kv-path=decisionmesh/db,decisionmesh/redis,decisionmesh/llm,decisionmesh/email,decisionmesh/zitadel,decisionmesh/auth,decisionmesh/billing,decisionmesh/kafka

# =====================================================
# LLM bridge — API keys injected from Vault (decisionmesh/llm)
# =====================================================
llm.openai.api.key=${llm.openai.api-key:}
llm.gemini.api.key=${llm.gemini.api-key:}
llm.deepseek.api.key=${llm.deepseek.api-key:}

llm.azure.api-key=not-configured
llm.azure.resource-name=not-configured

# =====================================================
# LLM defaults
# =====================================================
llm.cache.enabled=true
llm.default.provider=anthropic
llm.default.model=claude-haiku-4-5-20251001

llm.anthropic.model=claude-haiku-4-5-20251001
llm.anthropic.max-tokens=1024
llm.anthropic.default-timeout-ms=30000

llm.openai.default-model=gpt-4o-mini
llm.openai.default-timeout-ms=30000

llm.gemini.default-model=gemini-2.0-flash
llm.gemini.default-timeout-ms=30000

llm.deepseek.default-model=deepseek-chat
llm.deepseek.default-timeout-ms=60000

# =====================================================
# Planner / learning
# =====================================================
llm.selector.epsilon=0.10
llm.selector.strict-mode=false
llm.selector.warmup-calls=20
llm.selector.circuit-breaker-threshold=5
llm.registry.fail-fast-on-empty=false

planner.epsilon=0.10
planner.fallback-enabled=true
learning.cache.ttl-hours=24

# =====================================================
# Datasource
# username + password injected from Vault (decisionmesh/db)
# =====================================================
quarkus.datasource.devservices.enabled=false
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.max-size=10
quarkus.datasource.jdbc.min-size=2

# =====================================================
# Flyway
# =====================================================
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.repair-at-start=true
quarkus.flyway.out-of-order=true

# =====================================================
# Hibernate / ORM
# =====================================================
quarkus.hibernate-reactive.database.generation=none
quarkus.hibernate-orm.mapping.format.global=ignore

quarkus.index-dependency.persistence.group-id=com.decisionmesh
quarkus.index-dependency.persistence.artifact-id=decisionmesh-persistence

quarkus.index-dependency.security.group-id=com.decisionmesh
quarkus.index-dependency.security.artifact-id=decisionmesh-security

# =====================================================
# HTTP security
# =====================================================
quarkus.http.auth.permission.preflight.paths=/*
quarkus.http.auth.permission.preflight.methods=OPTIONS
quarkus.http.auth.permission.preflight.policy=permit
quarkus.http.auth.permission.preflight.priority=1

quarkus.http.auth.permission.public.paths=/q/*,/health/*,/metrics,/signup,/signup/*,/webhooks/*
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.public.priority=2

quarkus.http.auth.permission.api.paths=/api/*,/v1/*
quarkus.http.auth.permission.api.policy=authenticated
quarkus.http.auth.permission.api.priority=3

# =====================================================
# Redis / Kafka dev services disabled
# =====================================================
quarkus.redis.devservices.enabled=false
quarkus.kafka.devservices.enabled=false

# =====================================================
# Observability
# =====================================================
quarkus.otel.enabled=false
quarkus.banner.enabled=true

# =====================================================
# Logging
# =====================================================
quarkus.log.level=INFO
quarkus.log.category."com.decisionmesh".level=INFO
quarkus.log.category."io.quarkus.oidc".level=WARN
quarkus.log.category."io.quarkus.security".level=WARN

# =====================================================
# Fintech vertical
# =====================================================
decisionmesh.vertical.default=FINTECH
decisionmesh.intent-library.bootstrap=true
decisionmesh.intent-library.schema-path=intent-library-fintech.json

# =====================================================
# Email — credentials injected from Vault (decisionmesh/email)
# =====================================================
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=587
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.auth-methods=LOGIN
quarkus.mailer.mock=false
