# ?? Datasource ? DISABLED ?????????????????????????????????????????????????????
quarkus.datasource.jdbc=false
quarkus.datasource.reactive=false
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=false
quarkus.flyway.migrate-at-start=false
quarkus.flyway.enabled=false
quarkus.hibernate-orm.enabled=false

# ?? Disable ALL devservices (no Docker needed) ????????????????????????????????
quarkus.devservices.enabled=false
quarkus.keycloak.devservices.enabled=false

# ?? OIDC / Security ???????????????????????????????????????????????????????????
quarkus.oidc.enabled=false
quarkus.oidc.auth-server-url=https://dummy.zitadel.local
quarkus.security.auth.enabled-in-dev-mode=false

# ?? Exclude ALL DB-dependent and infrastructure beans from CDI ????????????????
# Single line avoids multiline backslash issues on Windows
quarkus.arc.exclude-types=com.decisionmesh.llm.persistence.ExecutionRecordRepository,com.decisionmesh.llm.registry.AdapterRegistry,com.decisionmesh.llm.dto.PolicyEvaluationRepository,com.decisionmesh.persistence.repository.AdapterPerformanceRepository,com.decisionmesh.persistence.learning.RedisAdapterLearning,com.decisionmesh.contracts.security.filter.TenantContextFilter,com.decisionmesh.llm.LlmExecutionEngine,com.decisionmesh.llm.service.AdapterPerformanceService,com.decisionmesh.application.service.ControlPlaneOrchestrator,com.decisionmesh.application.service.DriftEvaluatorService,com.decisionmesh.billing.api.BillingResource,com.decisionmesh.llm.resource.AdapterResource,com.decisionmesh.cqrs.api.ReplayResource,com.decisionmesh.contracts.security.service.TenantResolverService,com.decisionmesh.streaming.consumer.ReactiveIdempotentConsumerGuard,com.decisionmesh.streaming.projection.IntentProjectionWorker,com.decisionmesh.streaming.outbox.ReactiveOutboxRepository,com.decisionmesh.streaming.projection.ExecutionAnalyticsProjectionWorker,com.decisionmesh.application.port.OutboxPortAdapter,com.decisionmesh.streaming.publisher.KafkaOutboxPublisher

# ?? Redis ?????????????????????????????????????????????????????????????????????
quarkus.redis.devservices.enabled=false
quarkus.redis.hosts=redis://localhost:6379
quarkus.redis.password=decisionmesh

# ?? LLM adapter config ????????????????????????????????????????????????????????
llm.openai.api-key=test-key
llm.anthropic.api-key=test-key
llm.gemini.api-key=test-key
llm.deepseek.api-key=test-key
llm.azure.api-key=test-key
llm.azure.resource-name=test-resource

# ?? Selector / planner ????????????????????????????????????????????????????????
llm.selector.epsilon=0.10
llm.registry.fail-fast-on-empty=false
planner.epsilon=0.10
planner.fallback-enabled=true
learning.cache.ttl-hours=24
controlplane.lock.intent-ttl-minutes=5
controlplane.lock.max-retries=5
controlplane.lock.initial-backoff-ms=100
controlplane.lock.extend-threshold-ms=60000