# ============================================================
# docker-compose_local.yml — local development overlay
# Extends docker-compose.yml.  API runs from your IDE.
#
# docker compose -f docker-compose.yml -f docker-compose_local.yml up -d
# ============================================================

services:

  postgres:
    ports:
      - "5432:5432"
    volumes:
      - postgres-local-data:/var/lib/postgresql/data

  redis:
    ports:
      - "6379:6379"

  kafka:
    ports:
      - "9092:9092"

  # Dev mode: stores secrets in memory, auto-unsealed.
  # Token is pinned to "dev-root-token" for predictability.
  openbao:
    environment:
      VAULT_DEV_ROOT_TOKEN_ID:   dev-root-token
      VAULT_DEV_LISTEN_ADDRESS:  0.0.0.0:8200
    command: server -dev
    ports:
      - "8200:8200"

  ollama:
    ports:
      - "11434:11434"
    volumes:
      - ollama-local-data:/root/.ollama

volumes:
  postgres-local-data:
  ollama-local-data:
