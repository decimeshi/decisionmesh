# =============================================================================
# docker-compose.prod.yml
# DecisionMesh — Production (Hetzner CX32 8GB / 4vCPU)
#
# SERVICES DECISION (based on full code review):
#
#   postgres   ✅ REQUIRED — primary data store, Flyway migrations
#   redis      ✅ REQUIRED — 10 classes use it directly on the hot path:
#                            RedisLockManager       — distributed intent locks (SET NX PX)
#                            RedisRateLimiter       — per-tenant rate limiting
#                            RedisIdempotencyService — duplicate intent prevention (SETNX)
#                            RedisPlanRepository    — intent plan storage
#                            RedisLearningEngine    — EMA adapter performance profiles
#                            RedisTelemetrySink     — telemetry event buffer
#                            RedisExecutionRepository — execution cache
#                            CachedIntentRepository — intent hot cache
#                            RedisAdapterLearning   — adapter learning data
#                            RedisRateLimiter (security) — API rate limiting
#   openbao    ✅ REQUIRED — VaultConfigSource reads all API keys at startup
#   ollama     ✅ REQUIRED — DriftEvaluatorService calls embedding endpoint
#   nginx      ✅ REQUIRED — SSL termination, single public entry point
#
#   kafka      ❌ REMOVED — KafkaOutboxPublisher has no @ApplicationScoped,
#                           is never instantiated as a CDI bean. DomainEventPublisher
#                           interface has no implementation. Zero @Incoming/@Outgoing
#                           annotations anywhere in the codebase.
#                           quarkus.kafka.devservices.enabled=false confirms this.
#                           Add back in Phase 4 when async streaming is implemented.
#
#   keycloak   ❌ REMOVED — Replaced by Zitadel Cloud (hosted externally)
#   prometheus ❌ DEFERRED — Phase 2
#   grafana    ❌ DEFERRED — Phase 2
#
# RAM budget on CX32 (8GB):
#   nginx         50MB
#   api          200MB   Quarkus native image
#   postgres     600MB   pgvector/pgvector:pg16
#   redis        256MB   locks + rate limit + idempotency + plans + cache
#   openbao      100MB   file storage
#   ollama       150MB   server process
#   nomic model  512MB   loaded on first embed call
#   overhead     300MB
#   --------------------
#   Total       2,168MB  (5.8GB headroom on 8GB CX32)
#
# Ports: only 80 + 443 are public. Backend network is internal-only.
# =============================================================================

name: decisionmesh-prod

services:

  # ── Nginx — SSL + reverse proxy ───────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: dm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/decisionmesh.conf:/etc/nginx/conf.d/decisionmesh.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend
      - backend
    logging: &logging
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── Certbot — auto SSL renewal ────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: dm-certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"

  # ── Quarkus API ───────────────────────────────────────────────────────────
  api:
    image: ${API_IMAGE:-ghcr.io/decisionmesh/api:latest}
    container_name: dm-api
    restart: unless-stopped
    environment:
      QUARKUS_PROFILE: prod
      QUARKUS_HTTP_PORT: 8080

      # ── Database (reactive + flyway JDBC) ────────────────────────────────
      QUARKUS_DATASOURCE_REACTIVE_URL: vertx-reactive:postgresql://postgres:5432/${DB_NAME:-decisionmesh}
      QUARKUS_DATASOURCE_USERNAME: ${DB_USER:-decisionmesh}
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-decisionmesh}

      # ── Zitadel Cloud (OIDC) ─────────────────────────────────────────────
      QUARKUS_OIDC_AUTH_SERVER_URL: ${ZITADEL_AUTHORITY:-https://decisionmesh-1pgrry.eu1.zitadel.cloud}
      QUARKUS_OIDC_CLIENT_ID: ${ZITADEL_CLIENT_ID:-368134611768783581}

      # ── OpenBao (VaultConfigSource reads all secrets at startup) ──────────
      QUARKUS_VAULT_URL: http://openbao:8200
      QUARKUS_VAULT_AUTHENTICATION_CLIENT_TOKEN: ${BAO_APP_TOKEN}

      # ── Redis (used by 10 classes — locks, rate limit, idempotency, cache)
      QUARKUS_REDIS_HOSTS: redis://:${REDIS_PASSWORD}@redis:6379

      # ── Ollama (DriftEvaluatorService embeddings) ─────────────────────────
      EMBEDDING_URL: http://ollama:11434
      EMBEDDING_MODEL: nomic-embed-text

      # ── CORS (update to your actual frontend domain) ──────────────────────
      QUARKUS_HTTP_CORS_ORIGINS: https://${DOMAIN:-yourdomain.com}

      # ── Zitadel service account (OnboardingService role assignment) ───────
      ZITADEL_URL: https://decisionmesh-1pgrry.eu1.zitadel.cloud
      ZITADEL_SERVICE_ACCOUNT_TOKEN: ${ZITADEL_SERVICE_TOKEN}
      ZITADEL_ORGANIZATION_ID: ${ZITADEL_ORG_ID:-368134337511633629}
      ZITADEL_PROJECT_ID: ${ZITADEL_PROJECT_ID:-368134576352038839}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      openbao:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *logging

  # ── PostgreSQL + pgvector ─────────────────────────────────────────────────
  # pgvector image = postgres 16 + vector extension preinstalled.
  # Flyway migrations run at startup via quarkus.flyway.migrate-at-start=true.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-decisionmesh}
      POSTGRES_USER: ${DB_USER:-decisionmesh}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-decisionmesh} -d ${DB_NAME:-decisionmesh}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *logging

  # ── Redis ─────────────────────────────────────────────────────────────────
  # REQUIRED — deeply embedded in the intent execution hot path:
  #   Lock:        SET key token NX PX <ttl>  (RedisLockManager)
  #   Rate limit:  INCR + EXPIRE per tenant/minute  (RedisRateLimiter)
  #   Idempotency: SETNX idempotency:<tenant>:<key>  (RedisIdempotencyService)
  #   Plans:       GET/SET plan:<intentId>:<version>  (RedisPlanRepository)
  #   Learning:    GET/SET learning:<intentId>:<adapterId>  (RedisLearningEngine)
  #   Telemetry:   RPUSH telemetry:<tenantId>  (RedisTelemetrySink)
  #   Executions:  GET/SET execution cache  (RedisExecutionRepository)
  redis:
    image: redis:7.2-alpine
    container_name: dm-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *logging

  # ── OpenBao — secrets management ─────────────────────────────────────────
  # VaultConfigSource in decisionmesh-bootstrap reads secrets at startup:
  #   secret/decisionmesh/llm       — Anthropic API key + model
  #   secret/decisionmesh/db        — DB credentials
  #   secret/decisionmesh/stripe    — Stripe keys
  #   secret/decisionmesh/razorpay  — Razorpay keys
  # Production file storage: persistent across container restarts.
  openbao:
    image: openbao/openbao:latest
    container_name: dm-openbao
    restart: unless-stopped
    command: server
    cap_add:
      - IPC_LOCK
    environment:
      BAO_LOG_LEVEL: warn
    volumes:
      - openbao_data:/openbao/data
      - ./infra/openbao/config.hcl:/openbao/config/config.hcl:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "bao status -address=http://127.0.0.1:8200 2>/dev/null; exit 0"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *logging

  # ── Ollama — local embedding server ──────────────────────────────────────
  # DriftEvaluatorService calls POST http://ollama:11434/api/embeddings.
  # CPU-only, no GPU needed. ~45ms per embed on 4 vCPU.
  # Model (nomic-embed-text) is pulled by ollama-init and cached in volume.
  ollama:
    image: ollama/ollama:latest
    container_name: dm-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *logging

  # ── Ollama init — pull model once on first start ──────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: dm-ollama-init
    restart: "no"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      sh -c "
        echo '[ollama-init] Waiting for Ollama to be ready...';
        sleep 15;
        ollama pull nomic-embed-text;
        echo '[ollama-init] nomic-embed-text ready.';
      "
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - backend

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true    # no direct internet access from backend services

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  openbao_data:
  ollama_data:
  certbot_www:
  certbot_certs:
