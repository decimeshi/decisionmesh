# ============================================================
# docker-compose_prod.yml — production overlay
# Extends docker-compose.yml.
#
# docker compose -f docker-compose.yml -f docker-compose_prod.yml up -d
#
# Prerequisites:
#   1. Copy .env.example → .env and fill in all values.
#   2. First-time OpenBao init (see config/openbao.hcl comments).
#   3. docker compose ... exec openbao bao operator unseal   (each restart)
# ============================================================

networks:
  # Caddy joins both internal and the host-facing side.
  internal:
    name: decisionmesh_internal

services:

  # ----------------------------------------------------------
  # API
  # ----------------------------------------------------------
  api:
    image: ${API_IMAGE:?API_IMAGE must be set in .env}
    container_name: dm-api
    restart: unless-stopped
    environment:
      QUARKUS_PROFILE:     prod
      QUARKUS_HTTP_PORT:   8080
      VAULT_TOKEN:         ${VAULT_TOKEN:?VAULT_TOKEN must be set in .env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      openbao:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768m
    networks:
      - internal

  # ----------------------------------------------------------
  # Caddy — TLS termination + HTTP→HTTPS redirect
  # Caddyfile is shared with the gateway compose if you run
  # prod + staging on the same box (see docker-compose_gateway.yml).
  # ----------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: dm-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"      # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
    networks:
      - internal

  # ----------------------------------------------------------
  # Infrastructure — restart + volume + memory policies
  # ----------------------------------------------------------
  postgres:
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 320m     # 256 mb maxmemory + OS overhead

  kafka:
    restart: unless-stopped
    volumes:
      - kafka-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 768m     # 512 mb JVM heap + metaspace

  # ----------------------------------------------------------
  # OpenBao — server mode with file storage backend.
  # Secrets survive restarts.  Must be init'd + unsealed once.
  # ----------------------------------------------------------
  openbao:
    restart: unless-stopped
    command: server -config=/openbao/config/openbao.hcl
    environment:
      BAO_ADDR: http://127.0.0.1:8200
    volumes:
      - openbao-data:/openbao/data
      - ./config/openbao.hcl:/openbao/config/openbao.hcl:ro
    deploy:
      resources:
        limits:
          memory: 192m

  ollama:
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 3g       # CPU-only; lower if memory is tight

volumes:
  postgres-data:
  kafka-data:
  openbao-data:
  ollama-data:
  caddy-data:
  caddy-config:
