# ============================================================
# docker-compose_staging.yml — standalone staging stack
# Completely self-contained; does NOT extend docker-compose.yml.
#
# docker compose -f docker-compose_staging.yml up -d
#
# NOTE: If running staging and prod on the SAME Hetzner box,
# use docker-compose_gateway.yml for a shared Caddy instance
# instead of the caddy service here.
# ============================================================

name: decisionmesh-staging

networks:
  internal:
    name: decisionmesh-staging_internal
    driver: bridge

services:

  # ----------------------------------------------------------
  # API
  # Service name is "api" inside this network so the staging
  # properties file uses the same hostnames as prod.
  # Container name dm-api-staging lets the gateway Caddy find it.
  # ----------------------------------------------------------
  api:
    image: ${API_IMAGE:?API_IMAGE must be set in .env}
    container_name: dm-api-staging
    restart: unless-stopped
    environment:
      QUARKUS_PROFILE:   staging
      QUARKUS_HTTP_PORT: 8081
      VAULT_TOKEN:       ${VAULT_TOKEN:?VAULT_TOKEN must be set in .env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      openbao:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768m
    networks:
      - internal

  # ----------------------------------------------------------
  # Caddy — only used when staging runs on its own machine.
  # On a shared box, comment this out and use the gateway.
  # ----------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: dm-caddy-staging
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.staging:/etc/caddy/Caddyfile:ro
      - caddy-staging-data:/data
      - caddy-staging-config:/config
    depends_on:
      - api
    networks:
      - internal

  # ----------------------------------------------------------
  # PostgreSQL
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-decisionmesh}
      POSTGRES_USER:     ${DB_USER:-decisionmesh}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-decisionmesh} -d ${DB_NAME:-decisionmesh}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - postgres-staging-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - internal

  # ----------------------------------------------------------
  # Redis
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 320m
    networks:
      - internal

  # ----------------------------------------------------------
  # Kafka — KRaft mode
  # ----------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID:                                  1
      KAFKA_PROCESS_ROLES:                            broker,controller
      KAFKA_LISTENERS:                                PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS:                     PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES:                CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:           PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS:                 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:         1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:            1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:                "true"
      KAFKA_CLUSTER_ID:                               ${KAFKA_CLUSTER_ID:?KAFKA_CLUSTER_ID must be set in .env}
      KAFKA_HEAP_OPTS:                                "-Xmx512m -Xms256m"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - kafka-staging-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 768m
    networks:
      - internal

  # ----------------------------------------------------------
  # OpenBao — server mode, persistent file storage
  # ----------------------------------------------------------
  openbao:
    image: openbao/openbao:2
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    command: server -config=/openbao/config/openbao.hcl
    environment:
      BAO_ADDR: http://127.0.0.1:8200
    healthcheck:
      test: >
        ["CMD-SHELL",
         "bao status -address=http://127.0.0.1:8200 2>/dev/null ||
          bao status -address=http://127.0.0.1:8200 2>&1 | grep -q Sealed"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - openbao-staging-data:/openbao/data
      - ./config/openbao.hcl:/openbao/config/openbao.hcl:ro
    deploy:
      resources:
        limits:
          memory: 192m
    networks:
      - internal

  # ----------------------------------------------------------
  # Ollama — CPU-only; consider disabling in staging to save RAM
  # ----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ollama-staging-data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 3g
    networks:
      - internal

volumes:
  postgres-staging-data:
  kafka-staging-data:
  openbao-staging-data:
  ollama-staging-data:
  caddy-staging-data:
  caddy-staging-config:
